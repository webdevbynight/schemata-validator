name: Feature request
description: Wouldn’t it be nice if schemata-validator could…
labels: ["enhancement"]
body:
  - type: textarea
    attributes:
      label: New feature motivation
      description: Describe the context, the use case and the advantages of the feature request.
    validations:
      required: true
  - type: textarea
    attributes:
      label: New feature description
      description: Describe the functional changes that would have to be made in schemata-validator.
    validations:
      required: true
  - type: textarea
    attributes:
      label: New feature implementation
      description: Optionally describe the technical changes to be made in schemata-validator.
    validations:
      required: false
